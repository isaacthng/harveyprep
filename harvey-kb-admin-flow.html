<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harvey — Admin User Flow</title>
<style>
  :root {
    --bg-base: #111111;
    --bg-raised: #1A1A1A;
    --bg-surface: #222222;
    --bg-hover: #2A2A2A;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.14);
    --fg-primary: #F5F0EB;
    --fg-secondary: #A8A199;
    --fg-subtle: #6B6560;
    --fg-muted: #4A4540;
    --accent: #C4956A;
    --accent-soft: rgba(196,149,106,0.08);
    --accent-border: rgba(196,149,106,0.22);
    --blue: #4F8BF6;
    --blue-soft: rgba(79,139,246,0.08);
    --blue-border: rgba(79,139,246,0.20);
    --purple: #8B5CF6;
    --purple-soft: rgba(139,92,246,0.08);
    --purple-border: rgba(139,92,246,0.20);
    --amber: #F59E0B;
    --amber-soft: rgba(245,158,11,0.08);
    --amber-border: rgba(245,158,11,0.20);
    --green: #10B981;
    --green-soft: rgba(16,185,129,0.08);
    --green-border: rgba(16,185,129,0.20);
    --red: #EF4444;
    --red-soft: rgba(239,68,68,0.08);
    --red-border: rgba(239,68,68,0.20);
    --radius: 8px;
    --radius-lg: 12px;
    --transition: 180ms ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-base);
    color: var(--fg-primary);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .page-header {
    text-align: center;
    padding: 48px 32px 12px;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .logo-mark {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 16px; color: var(--bg-base);
  }

  .logo-text {
    font-size: 18px; font-weight: 600;
    letter-spacing: 0.5px; color: var(--fg-primary);
  }

  .page-header h1 {
    font-size: 28px; font-weight: 700;
    letter-spacing: -0.5px; color: var(--fg-primary);
    margin-bottom: 6px;
  }

  .page-header .subtitle {
    font-size: 14px; color: var(--fg-subtle);
    max-width: 600px; margin: 0 auto; line-height: 1.6;
  }

  /* Legend */
  .legend {
    display: flex; justify-content: center; gap: 24px;
    padding: 16px 32px 8px; flex-wrap: wrap;
  }

  .legend-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--fg-secondary);
  }

  .legend-shape {
    width: 20px; height: 14px; border-radius: 3px;
    border: 1.5px solid;
  }

  .legend-diamond {
    width: 14px; height: 14px;
    transform: rotate(45deg);
    border: 1.5px solid;
    border-radius: 2px;
  }

  .legend-line {
    width: 24px; height: 0;
    border-top: 2px solid;
  }

  .legend-line-dashed {
    width: 24px; height: 0;
    border-top: 2px dashed;
  }

  /* Flow canvas */
  .flow-canvas {
    padding: 20px 32px 48px;
    overflow-x: auto;
    display: flex;
    justify-content: center;
  }

  .flow-svg {
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
  }

  /* Tooltip */
  .tooltip {
    position: fixed;
    background: #2A2A2A;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--fg-primary);
    max-width: 280px;
    line-height: 1.5;
    pointer-events: none;
    opacity: 0;
    transition: opacity 150ms ease;
    z-index: 1000;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }

  .tooltip.visible { opacity: 1; }
  .tooltip-title { font-weight: 600; margin-bottom: 4px; font-size: 13px; }
  .tooltip-body { color: var(--fg-secondary); }

  /* Section labels */
  .section-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 12px;
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.6px;
  }
</style>
</head>
<body>

<div class="page-header">
  <div class="logo">
    <div class="logo-mark">H</div>
    <div class="logo-text">HARVEY</div>
  </div>
  <h1>Admin User Flow — Knowledge Bases</h1>
  <p class="subtitle">Complete admin journey: creating, ingesting, organizing, permissioning, managing, and monitoring Knowledge Bases</p>
</div>

<div class="legend">
  <div class="legend-item">
    <div class="legend-shape" style="background:var(--accent-soft);border-color:var(--accent);"></div>
    Admin Action
  </div>
  <div class="legend-item">
    <div class="legend-shape" style="background:var(--purple-soft);border-color:var(--purple);"></div>
    AI / System Step
  </div>
  <div class="legend-item">
    <div class="legend-diamond" style="background:var(--amber-soft);border-color:var(--amber);"></div>
    Decision Point
  </div>
  <div class="legend-item">
    <div class="legend-shape" style="background:var(--green-soft);border-color:var(--green);"></div>
    Output / Success
  </div>
  <div class="legend-item">
    <div class="legend-shape" style="background:var(--red-soft);border-color:var(--red);"></div>
    Error / Fail-Closed
  </div>
  <div class="legend-item">
    <div class="legend-shape" style="background:var(--blue-soft);border-color:var(--blue);"></div>
    End User Touchpoint
  </div>
  <div class="legend-item">
    <div class="legend-line" style="border-color:var(--fg-subtle);"></div>
    Primary Flow
  </div>
  <div class="legend-item">
    <div class="legend-line-dashed" style="border-color:var(--accent);"></div>
    Cross-Flow Connection
  </div>
</div>

<div class="flow-canvas">
<svg class="flow-svg" width="1680" height="2480" viewBox="0 0 1680 2480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#6B6560"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#C4956A"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#4F8BF6"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#10B981"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#8B5CF6"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#F59E0B"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- A1: CREATE & CONFIGURE KB                          -->
  <!-- ═══════════════════════════════════════════════════ -->
  <g id="section-a1">
    <!-- Section label -->
    <rect x="40" y="20" width="220" height="28" rx="14" fill="rgba(196,149,106,0.08)" stroke="rgba(196,149,106,0.22)" stroke-width="1"/>
    <text x="56" y="39" font-size="11" font-weight="600" fill="#C4956A" letter-spacing="0.6" font-family="Inter, system-ui, sans-serif">A1 — CREATE &amp; CONFIGURE KB</text>

    <!-- Start node -->
    <g class="node" data-tooltip="Admin initiates KB creation from the Knowledge Bases dashboard" data-title="Start">
      <circle cx="80" cy="90" r="22" fill="var(--bg-raised)" stroke="#C4956A" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="80" y="94" text-anchor="middle" font-size="10" font-weight="600" fill="#C4956A" font-family="Inter, system-ui, sans-serif">START</text>
    </g>

    <!-- Arrow: Start -> Name & Describe -->
    <path d="M102,90 L140,90" stroke="#6B6560" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

    <!-- Name & Describe -->
    <g class="node" data-tooltip="Enter KB name, description, and purpose. This metadata helps users discover and understand the KB." data-title="Name & Describe KB">
      <rect x="148" y="68" width="140" height="44" rx="8" fill="var(--bg-raised)" stroke="rgba(196,149,106,0.4)" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="218" y="86" text-anchor="middle" font-size="11" font-weight="600" fill="var(--fg-primary)" font-family="Inter, system-ui, sans-serif">Name &amp; Describe</text>
      <text x="218" y="101" text-anchor="middle" font-size="10" fill="var(--fg-subtle)" font-family="Inter, system-ui, sans-serif">KB metadata</text>
    </g>

    <!-- Arrow -->
    <path d="M288,90 L320,90" stroke="#6B6560" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

    <!-- Select Practice Area -->
    <g class="node" data-tooltip="Assign to a practice area (e.g., M&A, Litigation, Tax). Used for discovery and recommended KBs." data-title="Select Practice Area">
      <rect x="328" y="68" width="140" height="44" rx="8" fill="var(--bg-raised)" stroke="rgba(196,149,106,0.4)" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="398" y="86" text-anchor="middle" font-size="11" font-weight="600" fill="var(--fg-primary)" font-family="Inter, system-ui, sans-serif">Practice Area</text>
      <text x="398" y="101" text-anchor="middle" font-size="10" fill="var(--fg-subtle)" font-family="Inter, system-ui, sans-serif">M&amp;A, Litigation, Tax...</text>
    </g>

    <!-- Arrow -->
    <path d="M468,90 L500,90" stroke="#6B6560" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

    <!-- Set Permissions -->
    <g class="node" data-tooltip="Define which users and groups can access this KB. Integrates with firm directory and Intapp Walls." data-title="Set User Permissions">
      <rect x="508" y="68" width="140" height="44" rx="8" fill="var(--bg-raised)" stroke="rgba(196,149,106,0.4)" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="578" y="86" text-anchor="middle" font-size="11" font-weight="600" fill="var(--fg-primary)" font-family="Inter, system-ui, sans-serif">User Permissions</text>
      <text x="578" y="101" text-anchor="middle" font-size="10" fill="var(--fg-subtle)" font-family="Inter, system-ui, sans-serif">Access groups</text>
    </g>

    <!-- Arrow -->
    <path d="M648,90 L680,90" stroke="#6B6560" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

    <!-- Admin Permissions -->
    <g class="node" data-tooltip="Set admin-level permissions: who can edit, manage content, and configure this KB." data-title="Set Admin Permissions">
      <rect x="688" y="68" width="140" height="44" rx="8" fill="var(--bg-raised)" stroke="rgba(196,149,106,0.4)" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="758" y="86" text-anchor="middle" font-size="11" font-weight="600" fill="var(--fg-primary)" font-family="Inter, system-ui, sans-serif">Admin Permissions</text>
      <text x="758" y="101" text-anchor="middle" font-size="10" fill="var(--fg-subtle)" font-family="Inter, system-ui, sans-serif">Editors &amp; managers</text>
    </g>

    <!-- Arrow -->
    <path d="M828,90 L860,90" stroke="#6B6560" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

    <!-- Quality Controls -->
    <g class="node" data-tooltip="Configure quality gates: require approval before publishing? Auto-publish new uploads? Review thresholds." data-title="Quality Controls">
      <rect x="868" y="68" width="160" height="44" rx="8" fill="var(--bg-raised)" stroke="rgba(196,149,106,0.4)" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="948" y="86" text-anchor="middle" font-size="11" font-weight="600" fill="var(--fg-primary)" font-family="Inter, system-ui, sans-serif">Quality Controls</text>
      <text x="948" y="101" text-anchor="middle" font-size="10" fill="var(--fg-subtle)" font-family="Inter, system-ui, sans-serif">Approval? Auto-publish?</text>
    </g>

    <!-- Arrow -->
    <path d="M1028,90 L1070,90" stroke="#6B6560" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

    <!-- KB Created (Draft) -->
    <g class="node" data-tooltip="KB is created in Draft state. Not yet visible to end users. Ready for content upload." data-title="KB Created (Draft)">
      <rect x="1078" y="68" width="150" height="44" rx="8" fill="var(--green-soft)" stroke="var(--green)" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="1153" y="86" text-anchor="middle" font-size="11" font-weight="600" fill="var(--green)" font-family="Inter, system-ui, sans-serif">KB Created</text>
      <text x="1153" y="101" text-anchor="middle" font-size="10" fill="rgba(16,185,129,0.7)" font-family="Inter, system-ui, sans-serif">Draft State</text>
    </g>

    <!-- Connection to A2 -->
    <path d="M1153,112 L1153,145 L250,145 L250,180" stroke="#C4956A" stroke-width="1.5" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow-accent)"/>
    <text x="700" y="141" text-anchor="middle" font-size="10" fill="#C4956A" font-family="Inter, system-ui, sans-serif">→ Proceed to Upload (A2)</text>

    <!-- Connection to A4 -->
    <path d="M578,112 L578,145 L1440,145 L1440,180" stroke="#C4956A" stroke-width="1.5" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow-accent)"/>
    <text x="1300" y="141" text-anchor="middle" font-size="10" fill="#C4956A" font-family="Inter, system-ui, sans-serif">→ Configure Permissions (A4)</text>
  </g>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- A2: UPLOAD & INGEST DOCUMENTS                      -->
  <!-- ═══════════════════════════════════════════════════ -->
  <g id="section-a2">
    <rect x="40" y="190" width="260" height="28" rx="14" fill="rgba(196,149,106,0.08)" stroke="rgba(196,149,106,0.22)" stroke-width="1"/>
    <text x="56" y="209" font-size="11" font-weight="600" fill="#C4956A" letter-spacing="0.6" font-family="Inter, system-ui, sans-serif">A2 — UPLOAD &amp; INGEST DOCUMENTS</text>

    <!-- Entry paths -->
    <g class="node" data-tooltip="Automatic sync from iManage DMS. Documents are pulled on schedule or via webhook trigger." data-title="DMS Sync (iManage)">
      <rect x="56" y="240" width="140" height="44" rx="8" fill="var(--bg-raised)" stroke="rgba(196,149,106,0.4)" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="126" y="258" text-anchor="middle" font-size="11" font-weight="600" fill="var(--fg-primary)" font-family="Inter, system-ui, sans-serif">DMS Sync</text>
      <text x="126" y="273" text-anchor="middle" font-size="10" fill="var(--fg-subtle)" font-family="Inter, system-ui, sans-serif">iManage integration</text>
    </g>

    <g class="node" data-tooltip="Upload multiple documents at once via drag-and-drop or file picker. Supports PDFs, DOCX, and more." data-title="Bulk Upload">
      <rect x="216" y="240" width="130" height="44" rx="8" fill="var(--bg-raised)" stroke="rgba(196,149,106,0.4)" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="281" y="258" text-anchor="middle" font-size="11" font-weight="600" fill="var(--fg-primary)" font-family="Inter, system-ui, sans-serif">Bulk Upload</text>
      <text x="281" y="273" text-anchor="middle" font-size="10" fill="var(--fg-subtle)" font-family="Inter, system-ui, sans-serif">Drag &amp; drop</text>
    </g>

    <g class="node" data-tooltip="Upload a single document with manual metadata entry." data-title="Individual Upload">
      <rect x="366" y="240" width="130" height="44" rx="8" fill="var(--bg-raised)" stroke="rgba(196,149,106,0.4)" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="431" y="258" text-anchor="middle" font-size="11" font-weight="600" fill="var(--fg-primary)" font-family="Inter, system-ui, sans-serif">Single Upload</text>
      <text x="431" y="273" text-anchor="middle" font-size="10" fill="var(--fg-subtle)" font-family="Inter, system-ui, sans-serif">Manual entry</text>
    </g>

    <g class="node" data-tooltip="Documents nominated by end users (U5). These arrive in the admin's approval queue with user-provided context." data-title="Knowledge Nomination">
      <rect x="516" y="240" width="160" height="44" rx="8" fill="var(--blue-soft)" stroke="var(--blue)" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="596" y="258" text-anchor="middle" font-size="11" font-weight="600" fill="var(--blue)" font-family="Inter, system-ui, sans-serif">Knowledge Nomination</text>
      <text x="596" y="273" text-anchor="middle" font-size="10" fill="rgba(79,139,246,0.7)" font-family="Inter, system-ui, sans-serif">From end users (U5)</text>
    </g>

    <!-- Converge arrows to AI Processing -->
    <path d="M126,284 L126,310 L420,310 L420,330" stroke="#6B6560" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
    <path d="M281,284 L281,310 L420,310" stroke="#6B6560" stroke-width="1.5" fill="none"/>
    <path d="M431,284 L431,310 L420,310" stroke="#6B6560" stroke-width="1.5" fill="none"/>
    <path d="M596,284 L596,310 L420,310" stroke="#6B6560" stroke-width="1.5" fill="none"/>

    <!-- AI Processing Pipeline -->
    <rect x="100" y="338" width="650" height="70" rx="10" fill="rgba(139,92,246,0.04)" stroke="rgba(139,92,246,0.15)" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="120" y="355" font-size="10" font-weight="600" fill="var(--purple)" letter-spacing="0.5" font-family="Inter, system-ui, sans-serif">AI PROCESSING PIPELINE</text>

    <g class="node" data-tooltip="Document parsing: extract text, tables, headers, footnotes from PDFs, DOCX, and other formats." data-title="Parse">
      <rect x="120" y="364" width="90" height="34" rx="6" fill="var(--purple-soft)" stroke="var(--purple)" stroke-width="1.2"/>
      <text x="165" y="385" text-anchor="middle" font-size="11" font-weight="600" fill="var(--purple)" font-family="Inter, system-ui, sans-serif">Parse</text>
    </g>

    <path d="M210,381 L230,381" stroke="#8B5CF6" stroke-width="1.2" fill="none" marker-end="url(#arrow-purple)"/>

    <g class="node" data-tooltip="AI classifies document type (memo, agreement, brief, etc.) with a confidence score. Low-confidence items get flagged for admin review." data-title="Classify">
      <rect x="238" y="364" width="100" height="34" rx="6" fill="var(--purple-soft)" stroke="var(--purple)" stroke-width="1.2"/>
      <text x="288" y="385" text-anchor="middle" font-size="11" font-weight="600" fill="var(--purple)" font-family="Inter, system-ui, sans-serif">Classify</text>
    </g>

    <path d="M338,381 L358,381" stroke="#8B5CF6" stroke-width="1.2" fill="none" marker-end="url(#arrow-purple)"/>

    <g class="node" data-tooltip="Extract metadata: parties, dates, jurisdiction, deal type, clause types. Feeds search and filtering." data-title="Extract Metadata">
      <rect x="366" y="364" width="120" height="34" rx="6" fill="var(--purple-soft)" stroke="var(--purple)" stroke-width="1.2"/>
      <text x="426" y="385" text-anchor="middle" font-size="11" font-weight="600" fill="var(--purple)" font-family="Inter, system-ui, sans-serif">Metadata</text>
    </g>

    <path d="M486,381 L506,381" stroke="#8B5CF6" stroke-width="1.2" fill="none" marker-end="url(#arrow-purple)"/>

    <g class="node" data-tooltip="Chunk documents into semantic segments optimized for retrieval. Preserves context and document structure." data-title="Chunk">
      <rect x="514" y="364" width="90" height="34" rx="6" fill="var(--purple-soft)" stroke="var(--purple)" stroke-width="1.2"/>
      <text x="559" y="385" text-anchor="middle" font-size="11" font-weight="600" fill="var(--purple)" font-family="Inter, system-ui, sans-serif">Chunk</text>
    </g>

    <path d="M604,381 L624,381" stroke="#8B5CF6" stroke-width="1.2" fill="none" marker-end="url(#arrow-purple)"/>

    <g class="node" data-tooltip="Generate vector embeddings for semantic search. Stored in vector database for retrieval." data-title="Embed">
      <rect x="632" y="364" width="90" height="34" rx="6" fill="var(--purple-soft)" stroke="var(--purple)" stroke-width="1.2"/>
      <text x="677" y="385" text-anchor="middle" font-size="11" font-weight="600" fill="var(--purple)" font-family="Inter, system-ui, sans-serif">Embed</text>
    </g>

    <!-- Arrow from pipeline to Admin Review -->
    <path d="M420,408 L420,440" stroke="#6B6560" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

    <!-- Admin Review -->
    <g class="node" data-tooltip="Admin reviews AI-generated classifications and metadata. Can approve, edit suggestions, or reject documents entirely." data-title="Admin Review">
      <rect x="320" y="448" width="200" height="48" rx="8" fill="var(--bg-raised)" stroke="rgba(196,149,106,0.4)" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="420" y="468" text-anchor="middle" font-size="12" font-weight="600" fill="var(--fg-primary)" font-family="Inter, system-ui, sans-serif">Admin Review</text>
      <text x="420" y="484" text-anchor="middle" font-size="10" fill="var(--fg-subtle)" font-family="Inter, system-ui, sans-serif">Approve / Edit / Reject AI suggestions</text>
    </g>

    <!-- Arrow to decision -->
    <path d="M420,496 L420,530" stroke="#6B6560" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

    <!-- Decision: Quality controls? -->

<div id="tooltip" class="tooltip">
  <div class="tooltip-title"></div>
  <div class="tooltip-body"></div>
</div>

<script>
  const tooltip = document.getElementById('tooltip');
  const tooltipTitle = tooltip.querySelector('.tooltip-title');
  const tooltipBody = tooltip.querySelector('.tooltip-body');

  document.querySelectorAll('.node').forEach(node => {
    node.style.cursor = 'pointer';

    node.addEventListener('mouseenter', (e) => {
      const title = node.dataset.title;
      const text = node.dataset.tooltip;
      if (!title && !text) return;

      tooltipTitle.textContent = title || '';
      tooltipBody.textContent = text || '';
      tooltip.classList.add('visible');

      // Highlight effect
      const rect = node.querySelector('rect') || node.querySelector('circle');
      if (rect) {
        rect.style.filter = 'brightness(1.2) drop-shadow(0 0 8px rgba(196,149,106,0.3))';
      }
    });

    node.addEventListener('mousemove', (e) => {
      const x = e.clientX + 16;
      const y = e.clientY - 8;
      const tipRect = tooltip.getBoundingClientRect();

      tooltip.style.left = (x + tipRect.width > window.innerWidth)
        ? (e.clientX - tipRect.width - 16) + 'px'
        : x + 'px';
      tooltip.style.top = (y + tipRect.height > window.innerHeight)
        ? (e.clientY - tipRect.height - 8) + 'px'
        : y + 'px';
    });

    node.addEventListener('mouseleave', () => {
      tooltip.classList.remove('visible');
      const rect = node.querySelector('rect') || node.querySelector('circle');
      if (rect) {
        rect.style.filter = '';
      }
    });
  });
</script>
